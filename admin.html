<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel das TVs</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: #fffaf2;
      --panel-strong: #ffffff;
      --ink: #22201c;
      --muted: #70685f;
      --accent: #ad3f28;
      --accent-soft: #f2d5cd;
      --border: #dccfbe;
      --success: #1d7b4b;
      --danger: #a12c2c;
      --shadow: 0 18px 40px rgba(34, 32, 28, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(173, 63, 40, 0.12), transparent 30%),
        linear-gradient(180deg, #f7f1e8 0%, #efe7db 100%);
      color: var(--ink);
    }

    .page {
      max-width: 1260px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .hero,
    .toolbar,
    .editor {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
    }

    .hero p,
    .hint,
    .meta,
    .status,
    .upload-state {
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 18px;
      margin-bottom: 20px;
      align-items: center;
    }

    .editor {
      padding: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .device-card,
    .new-device {
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }

    .device-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .device-head strong {
      font-size: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .fields {
      display: grid;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      min-height: 170px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: #e9dece;
      color: var(--ink);
    }

    .danger {
      background: #f6d7d7;
      color: var(--danger);
    }

    .toolbar .status {
      margin-left: auto;
      min-width: 220px;
      text-align: right;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .raw-json {
      margin-top: 24px;
      display: grid;
      gap: 10px;
    }

    .toolbar input {
      max-width: 220px;
    }

    .upload-panel {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      display: grid;
      gap: 10px;
    }

    .upload-panel input[type="file"] {
      padding: 8px;
    }

    .upload-state {
      font-size: 12px;
      min-height: 16px;
    }

    @media (max-width: 720px) {
      .toolbar .status {
        margin-left: 0;
        text-align: left;
        min-width: 0;
      }

      .toolbar input {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Painel das TVs</h1>
      <p>A pessoa pode subir video ou imagem direto pela interface, salvar online e a TV busca tudo automaticamente.</p>
      <div class="hint">Para cada TV, abra uma vez <code>index.html?device=tv-sala</code>. O navegador guarda o ID e tenta manter a midia em cache local para uso offline.</div>
    </section>

    <section class="toolbar">
      <input id="passwordInput" type="password" placeholder="Senha do painel">
      <button class="secondary" id="loadRemoteBtn">Carregar online</button>
      <button class="primary" id="saveRemoteBtn">Salvar online</button>
      <button class="secondary" id="downloadBtn">Baixar backup JSON</button>
      <div class="status" id="status">Pronto para editar</div>
    </section>

    <section class="editor">
      <div class="grid" id="deviceList"></div>

      <div class="new-device">
        <div class="device-head">
          <strong>Nova TV</strong>
          <span class="badge">Adicionar</span>
        </div>
        <div class="fields">
          <label>
            ID da TV
            <input id="newId" placeholder="Ex.: tv-sala">
          </label>
          <label>
            Nome interno
            <input id="newName" placeholder="Ex.: TV Sala">
          </label>
          <label>
            Tipo
            <select id="newDeviceType">
              <option value="tv">TV</option>
              <option value="outro">Outro</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button class="primary" id="addDeviceBtn">Adicionar TV</button>
        </div>
      </div>

      <div class="raw-json">
        <label for="jsonPreview">Preview do JSON das TVs</label>
        <textarea id="jsonPreview" readonly></textarea>
      </div>
    </section>
  </div>

  <script type="module">
    import { upload } from "https://esm.sh/@vercel/blob/client";

    (function () {
      var ADMIN_API_URL = "/api/tv-admin-config";
      var DELETE_API_URL = "/api/tv-media-delete";
      var UPLOAD_API_URL = "/api/tv-upload";
      var PUBLIC_CONFIG_FALLBACK_URL = "tv-config.json";
      var PASSWORD_STORAGE_KEY = "wall-tv-admin-password";
      var config = { devices: {} };
      var deviceList = document.getElementById("deviceList");
      var jsonPreview = document.getElementById("jsonPreview");
      var statusEl = document.getElementById("status");
      var passwordInput = document.getElementById("passwordInput");

      function setStatus(message, tone) {
        statusEl.textContent = message;
        statusEl.style.color = tone === "error" ? "#a12c2c" : tone === "success" ? "#1d7b4b" : "";
      }

      function ensureShape(input) {
        if (!input || typeof input !== "object") {
          return { devices: {} };
        }

        if (input.devices && typeof input.devices === "object") {
          return { devices: input.devices };
        }

        return { devices: input };
      }

      function createEmptyDevice(id, name, deviceType) {
        return {
          name: name || id,
          deviceType: deviceType || "tv",
          label: name || id,
          media: {
            type: "video",
            url: "",
            version: "1",
            poster: ""
          }
        };
      }

      function render() {
        var entries = Object.keys(config.devices || {});
        deviceList.innerHTML = "";

        if (!entries.length) {
          var empty = document.createElement("div");
          empty.className = "device-card";
          empty.textContent = "Nenhuma TV cadastrada ainda.";
          deviceList.appendChild(empty);
        }

        entries.forEach(function (id) {
          var device = config.devices[id];
          var media = device.media || {};
          var card = document.createElement("div");
          card.className = "device-card";
          card.innerHTML =
            '<div class="device-head">' +
              "<strong>" + escapeHtml(device.name || id) + "</strong>" +
              '<span class="badge">' + escapeHtml(device.deviceType || "tv") + "</span>" +
            "</div>" +
            '<div class="meta">ID: <code>' + escapeHtml(id) + "</code></div>" +
            '<div class="fields">' +
              field("Nome", device.name || "", "name") +
              field("Label exibida", device.label || "", "label") +
              selectField("Tipo do dispositivo", device.deviceType || "tv", "deviceType", [
                { value: "tv", label: "TV" },
                { value: "outro", label: "Outro" }
              ]) +
              selectField("Tipo de midia", media.type || "video", "media.type", [
                { value: "video", label: "Video" },
                { value: "image", label: "Imagem" }
              ]) +
              field("URL da midia", media.url || "", "media.url") +
              field("Poster opcional", media.poster || "", "media.poster") +
              field("Versao", String(media.version || "1"), "media.version") +
            "</div>" +
            '<div class="upload-panel">' +
              '<label>Enviar arquivo de video ou imagem<input type="file" data-upload-input="' + escapeHtml(id) + '" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/webm"></label>' +
              '<div class="upload-state" data-upload-state="' + escapeHtml(id) + '">Nenhum upload em andamento.</div>' +
              '<div class="actions">' +
                '<button class="secondary" data-action="upload" data-id="' + escapeHtml(id) + '">Fazer upload</button>' +
                '<button class="secondary" data-action="clear-media" data-id="' + escapeHtml(id) + '">Limpar midia</button>' +
              '</div>' +
            "</div>" +
            '<div class="actions">' +
              '<button class="danger" data-action="remove" data-id="' + escapeHtml(id) + '">Remover TV</button>' +
            "</div>";

          wireInputs(card, id);
          deviceList.appendChild(card);
        });

        jsonPreview.value = JSON.stringify(config, null, 2);
      }

      function field(label, value, key) {
        return '<label>' + escapeHtml(label) + '<input data-key="' + escapeHtml(key) + '" value="' + escapeHtml(value) + '"></label>';
      }

      function selectField(label, value, key, options) {
        var html = '<label>' + escapeHtml(label) + '<select data-key="' + escapeHtml(key) + '">';
        options.forEach(function (option) {
          html += '<option value="' + escapeHtml(option.value) + '"' + (option.value === value ? " selected" : "") + ">" + escapeHtml(option.label) + "</option>";
        });
        html += "</select></label>";
        return html;
      }

      function wireInputs(card, id) {
        var inputs = card.querySelectorAll("[data-key]");
        var removeBtn = card.querySelector('[data-action="remove"]');
        var uploadBtn = card.querySelector('[data-action="upload"]');
        var clearMediaBtn = card.querySelector('[data-action="clear-media"]');

        inputs.forEach(function (input) {
          input.addEventListener("input", function () {
            updateValue(id, input.getAttribute("data-key"), input.value);
          });
          input.addEventListener("change", function () {
            updateValue(id, input.getAttribute("data-key"), input.value);
          });
        });

        removeBtn.addEventListener("click", function () {
          removeDevice(id);
        });

        uploadBtn.addEventListener("click", function () {
          uploadDeviceMedia(id, uploadBtn);
        });

        clearMediaBtn.addEventListener("click", function () {
          clearDeviceMedia(id);
        });
      }

      function updateValue(id, path, value) {
        var parts = path.split(".");
        var target = config.devices[id];
        var i;

        for (i = 0; i < parts.length - 1; i++) {
          if (!target[parts[i]] || typeof target[parts[i]] !== "object") {
            target[parts[i]] = {};
          }
          target = target[parts[i]];
        }

        target[parts[parts.length - 1]] = value;
        jsonPreview.value = JSON.stringify(config, null, 2);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function downloadJson() {
        var blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = "tv-config.json";
        link.click();
        URL.revokeObjectURL(url);
        setStatus("Backup baixado", "success");
      }

      function getPassword() {
        return (passwordInput.value || "").trim();
      }

      function storePassword() {
        var password = getPassword();
        try {
          window.sessionStorage.setItem(PASSWORD_STORAGE_KEY, password);
        } catch (error) {}
        document.cookie = "tv_admin_password=" + encodeURIComponent(password) + "; path=/; SameSite=Strict; Secure";
      }

      function restorePassword() {
        try {
          var saved = window.sessionStorage.getItem(PASSWORD_STORAGE_KEY) || "";
          if (saved) {
            passwordInput.value = saved;
            storePassword();
          }
        } catch (error) {}
      }

      function getHeaders(includeBody) {
        var password = getPassword();
        if (!password) {
          throw new Error("Informe a senha do painel");
        }

        storePassword();

        var headers = {
          "Authorization": "Bearer " + password
        };

        if (includeBody) {
          headers["Content-Type"] = "application/json";
        }

        return headers;
      }

      function parseApiResponse(response) {
        return response.json().catch(function () {
          return {};
        }).then(function (data) {
          if (!response.ok) {
            throw new Error(data.error || "Falha na requisicao");
          }
          return data;
        });
      }

      function requestJson(url, method, body) {
        var options = {
          method: method,
          headers: getHeaders(Boolean(body))
        };

        if (body) {
          options.body = JSON.stringify(body);
        }

        return fetch(url, options).then(parseApiResponse);
      }

      function loadFallbackConfig(reason) {
        return fetch(PUBLIC_CONFIG_FALLBACK_URL + "?v=" + Date.now(), { cache: "no-store" })
          .then(function (response) {
            if (!response.ok) {
              throw new Error(reason || "Nao foi possivel carregar a configuracao das TVs");
            }
            return response.json();
          })
          .then(function (data) {
            config = ensureShape(data);
            render();
            setStatus(reason ? "Fallback local carregado: " + reason : "Fallback local carregado", "error");
          })
          .catch(function (error) {
            setStatus(error.message || String(error), "error");
          });
      }

      function loadRemote() {
        return requestJson(ADMIN_API_URL, "GET")
          .then(function (data) {
            config = ensureShape(data);
            render();
            setStatus("Configuracao online carregada", "success");
          })
          .catch(function (error) {
            return loadFallbackConfig(error.message || String(error));
          });
      }

      function saveRemote() {
        requestJson(ADMIN_API_URL, "POST", config)
          .then(function (data) {
            config = ensureShape(data);
            render();
            setStatus("Configuracao salva online", "success");
          })
          .catch(function (error) {
            setStatus(error.message || String(error), "error");
          });
      }

      function getUploadStateElement(id) {
        return document.querySelector('[data-upload-state="' + cssEscape(id) + '"]');
      }

      function getUploadInputElement(id) {
        return document.querySelector('[data-upload-input="' + cssEscape(id) + '"]');
      }

      function setUploadState(id, message, tone) {
        var element = getUploadStateElement(id);
        if (!element) {
          return;
        }
        element.textContent = message;
        element.style.color = tone === "error" ? "#a12c2c" : tone === "success" ? "#1d7b4b" : "";
      }

      function cssEscape(value) {
        return String(value).replace(/"/g, '\\"');
      }

      function getCurrentMediaUrl(id) {
        return config.devices[id] && config.devices[id].media ? config.devices[id].media.url || "" : "";
      }

      function removeBlobIfManaged(url) {
        if (!url) {
          return Promise.resolve();
        }

        return requestJson(DELETE_API_URL, "POST", { url: url }).catch(function () {
          return {};
        });
      }

      function uploadDeviceMedia(id, button) {
        var input = getUploadInputElement(id);
        var file = input && input.files ? input.files[0] : null;

        if (!file) {
          setStatus("Selecione um arquivo antes do upload", "error");
          setUploadState(id, "Selecione um arquivo para enviar.", "error");
          return;
        }

        var password = getPassword();
        if (!password) {
          setStatus("Informe a senha do painel", "error");
          setUploadState(id, "Informe a senha para enviar arquivos.", "error");
          return;
        }

        storePassword();
        button.disabled = true;
        setUploadState(id, "Preparando upload...", "");

        var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "-");
        var randomSuffix = Math.random().toString(36).slice(2, 10);
        var oldUrl = getCurrentMediaUrl(id);

        upload("tv-media/" + id + "/" + Date.now() + "-" + randomSuffix + "-" + safeName, file, {
          access: "public",
          handleUploadUrl: UPLOAD_API_URL,
          clientPayload: password,
          onUploadProgress: function (progressEvent) {
            if (progressEvent && typeof progressEvent.percentage === "number") {
              setUploadState(id, "Upload " + Math.round(progressEvent.percentage) + "%", "");
            }
          }
        })
          .then(function (blob) {
            if (!config.devices[id].media) {
              config.devices[id].media = {};
            }

            config.devices[id].media.url = blob.url;
            config.devices[id].media.type = file.type.indexOf("image/") === 0 ? "image" : "video";
            config.devices[id].media.version = String(Date.now());
            jsonPreview.value = JSON.stringify(config, null, 2);

            return saveRemoteAfterUpload(id, oldUrl, blob.url);
          })
          .then(function () {
            if (input) {
              input.value = "";
            }
            setUploadState(id, "Upload concluido e salvo online.", "success");
          })
          .catch(function (error) {
            setUploadState(id, error.message || String(error), "error");
            setStatus(error.message || String(error), "error");
          })
          .finally(function () {
            button.disabled = false;
          });
      }

      function saveRemoteAfterUpload(id, oldUrl, newUrl) {
        return requestJson(ADMIN_API_URL, "POST", config)
          .then(function (data) {
            config = ensureShape(data);
            render();
            setStatus("Arquivo enviado e configuracao salva", "success");
            if (oldUrl && oldUrl !== newUrl) {
              return removeBlobIfManaged(oldUrl);
            }
          });
      }

      function clearDeviceMedia(id) {
        var existingUrl = getCurrentMediaUrl(id);

        if (!config.devices[id].media) {
          config.devices[id].media = {};
        }

        config.devices[id].media.url = "";
        config.devices[id].media.poster = "";
        config.devices[id].media.version = String(Date.now());
        render();

        requestJson(ADMIN_API_URL, "POST", config)
          .then(function (data) {
            config = ensureShape(data);
            render();
            setStatus("Midia removida da TV", "success");
            return removeBlobIfManaged(existingUrl);
          })
          .catch(function (error) {
            setStatus(error.message || String(error), "error");
          });
      }

      function removeDevice(id) {
        var existingUrl = getCurrentMediaUrl(id);
        delete config.devices[id];
        render();

        requestJson(ADMIN_API_URL, "POST", config)
          .then(function (data) {
            config = ensureShape(data);
            render();
            setStatus("TV removida", "success");
            return removeBlobIfManaged(existingUrl);
          })
          .catch(function (error) {
            setStatus(error.message || String(error), "error");
          });
      }

      document.getElementById("addDeviceBtn").addEventListener("click", function () {
        var id = document.getElementById("newId").value.trim();
        var name = document.getElementById("newName").value.trim();
        var deviceType = document.getElementById("newDeviceType").value;

        if (!id) {
          setStatus("Informe o ID da TV", "error");
          return;
        }

        if (!config.devices) {
          config.devices = {};
        }

        if (config.devices[id]) {
          setStatus("Ja existe uma TV com este ID", "error");
          return;
        }

        config.devices[id] = createEmptyDevice(id, name, deviceType);
        document.getElementById("newId").value = "";
        document.getElementById("newName").value = "";
        render();
        setStatus("TV adicionada. Agora voce pode enviar um arquivo.", "success");
      });

      passwordInput.addEventListener("change", storePassword);
      document.getElementById("downloadBtn").addEventListener("click", downloadJson);
      document.getElementById("loadRemoteBtn").addEventListener("click", loadRemote);
      document.getElementById("saveRemoteBtn").addEventListener("click", saveRemote);

      restorePassword();
      loadRemote().then(function () {
        if (!Object.keys(config.devices || {}).length) {
          config = ensureShape({
            devices: {
              "default": createEmptyDevice("default", "TV Padrao", "tv")
            }
          });
          render();
        }
      });
    })();
  </script>
</body>
</html>
